name: Custom Image Overlay Workflow

on:
  workflow_dispatch:
    inputs:
      images_json:
        description: "JSON array of items {bg_image, photos[], texts[], font_size}"
        required: true
        type: string

jobs:
  custom-overlay-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install opencv-python-headless numpy requests playwright
          python -m playwright install --with-deps chromium

      - name: Download Apple Color Emoji font (iOS-style emoji)
        run: |
          URL=$(curl -fsSL https://api.github.com/repos/samuelngs/apple-emoji-linux/releases/latest \
            | grep -o 'https://[^"]*AppleColorEmoji-Linux\.ttf' | head -1)
          echo "Emoji font: $URL"
          curl -fsSL -o fonts/AppleColorEmoji.ttf "$URL"
          ls -la fonts/AppleColorEmoji.ttf

      - name: Save JSON to file
        env:
          IMAGES_JSON: ${{ github.event.inputs.images_json }}
        run: |
          printf '%s' "$IMAGES_JSON" > input.json

      - name: Run Custom Overlay Script
        env:
          SUPABASE_TOKEN: ${{ secrets.SUPABASE_TOKEN }}
        run: |
          python custom_image_overlay.py --input input.json --output results.json
          echo "---- results.json ----"
          cat results.json
