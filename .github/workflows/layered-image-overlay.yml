name: Layered Image Overlay Workflow

on:
  workflow_dispatch:
    inputs:
      layers_json:
        description: "JSON array of ordered layers (background, chroma_photo, overlay, text) — or list of {layers:[...]} items"
        required: true
        type: string

jobs:
  layered-overlay-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install opencv-python-headless numpy requests playwright
          python -m playwright install --with-deps chromium

      - name: Download Apple Color Emoji font (iOS-style emoji)
        run: |
          # Pinned: "latest" jumped to a ~116 MB font on 2026-06-13 which is
          # base64-embedded into page.set_content and OOM-crashes Chromium
          # ("Target page/context/browser has been closed"). 20260219 is 37 MB.
          URL="https://github.com/samuelngs/apple-emoji-ttf/releases/download/macos-26-20260219-2aa12422/AppleColorEmoji-Linux.ttf"
          echo "Emoji font (pinned): $URL"
          curl -fsSL -o fonts/AppleColorEmoji.ttf "$URL"
          ls -la fonts/AppleColorEmoji.ttf

      - name: Save JSON to file
        env:
          LAYERS_JSON: ${{ github.event.inputs.layers_json }}
        run: |
          printf '%s' "$LAYERS_JSON" > input.json

      - name: Run Layered Overlay Script
        env:
          SUPABASE_TOKEN: ${{ secrets.SUPABASE_TOKEN }}
        run: |
          python layered_image_overlay.py --input input.json --output results.json
          echo "---- results.json ----"
          cat results.json
